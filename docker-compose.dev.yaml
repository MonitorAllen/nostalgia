services:
  postgres:
    image: groonga/pgroonga:3.2.3-alpine-16
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=nostalgia
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    networks:
      - nostalgia
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    networks:
      - nostalgia
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env
    networks:
      - nostalgia
    volumes:
      - ./resources:/app/resources
    environment:
      - DB_SOURCE=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/nostalgia?sslmode=disable
      - REDIS_ADDRESS=redis:6379
      - REDIS_CACHE_DB=${REDIS_CACHE_DB:-0}
      - REDIS_QUEUE_DB=${REDIS_QUEUE_DB:-1}
      - AUTOMATION_HMAC_KEY_ID=${AUTOMATION_HMAC_KEY_ID:-}
      - AUTOMATION_HMAC_SECRET=${AUTOMATION_HMAC_SECRET:-}
      - AUTOMATION_SIGNATURE_TTL=${AUTOMATION_SIGNATURE_TTL:-5m}
      - AUTOMATION_DAILY_DRAFT_LIMIT=${AUTOMATION_DAILY_DRAFT_LIMIT:-1}
      - AUTOMATION_NOTIFY_EMAIL=${AUTOMATION_NOTIFY_EMAIL:-}
      - AI_POLISH_PROVIDER=${AI_POLISH_PROVIDER:-openai_compatible}
      - AI_POLISH_API_PROTOCOL=${AI_POLISH_API_PROTOCOL:-chat/completions}
      - AI_POLISH_BASE_URL=${AI_POLISH_BASE_URL:-}
      - AI_POLISH_API_KEY=${AI_POLISH_API_KEY:-}
      - AI_POLISH_MODEL=${AI_POLISH_MODEL:-}
      - AI_POLISH_TIMEOUT=${AI_POLISH_TIMEOUT:-30s}
      - AI_POLISH_MAX_INPUT_CHARS=${AI_POLISH_MAX_INPUT_CHARS:-6000}
      - AI_POLISH_MAX_CONTEXT_CHARS=${AI_POLISH_MAX_CONTEXT_CHARS:-4000}
      - AI_POLISH_MAX_SUGGESTIONS=${AI_POLISH_MAX_SUGGESTIONS:-3}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: ["/app/wait-for.sh", "postgres:5432", "--", "/app/start.sh"]
    command: ["/app/main"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  web:
    build:
      context: web
      dockerfile: Dockerfile.dev
    volumes:
      - ./resources:/usr/share/nginx/resources
      - ./logs/nginx:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    networks:
      - nostalgia
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  data-volume:

networks:
  nostalgia:
    driver: bridge
