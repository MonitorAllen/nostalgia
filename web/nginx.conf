worker_processes  auto;

events {
    worker_connections  2048;
    use epoll;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log /dev/stderr notice;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    server_tokens off;

    client_max_body_size 15m;

    # 开启 Gzip 压缩 (SPA 提速必备)
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_vary on;

    map $http_cf_connecting_ip $client_real_ip {
        default $http_cf_connecting_ip;
        ""      $remote_addr;
    }

    server {
        listen 80 default_server;
        server_name _;

        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl default_server;
        server_name _;

        ssl_certificate /etc/nginx/certs/cloudflare-origin.pem;
        ssl_certificate_key /etc/nginx/certs/cloudflare-origin.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        include /etc/nginx/security-headers.conf;

        location = /healthz {
            include /etc/nginx/security-headers.conf;
            proxy_pass http://api:8080/healthz;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $client_real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /readyz {
            include /etc/nginx/security-headers.conf;
            proxy_pass http://api:8080/readyz;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $client_real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api {
            include /etc/nginx/security-headers.conf;
            proxy_pass http://api:8080;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $client_real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            include /etc/nginx/security-headers.conf;
            proxy_pass http://api:8080;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $client_real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /v1 {
            include /etc/nginx/security-headers.conf;
            proxy_pass http://api:9091;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $client_real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /v1/ {
            include /etc/nginx/security-headers.conf;
            proxy_pass http://api:9091;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $client_real_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 前台博客入口
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
            # HTML文件不缓存，确保每次发版立刻生效
            include /etc/nginx/security-headers.conf;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # 前台静态资源缓存
        location /assets/ {
            root /usr/share/nginx/html;
            expires 1y;
            # 带有hash的资源直接强缓存
            include /etc/nginx/security-headers.conf;
            add_header Cache-Control "public, immutable";
        }

        # 资源文件
        location /resources/ {
            alias /usr/share/nginx/resources/;
            autoindex off;

            expires 7d;
            include /etc/nginx/security-headers.conf;
            add_header Cache-Control "public, no-transform";

            # 禁止访问隐藏文件
            location ~ /\. {
                deny all;
            }
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
