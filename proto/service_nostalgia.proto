syntax = "proto3";

package pb;

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";
import "rpc_create_article.proto";
import "rpc_delete_article.proto";
import "rpc_list_articles.proto";
import "rpc_get_article.proto";
import "rpc_update_article.proto";
import "rpc_upload_file.proto";
import "category.proto";

option go_package = 'github.com/MonitorAllen/nostalgia/pb';

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Nostalgia API";
    version: "1.0";
    contact: {
      name: "MonitorAllen Backend Master";
      url: "https://github.com/MonitorAllen";
      email: "monitorallen.pro@gmail.com";
    };
  };
};

service Nostalgia {
  rpc CreateArticle (CreateArticleRequest) returns (CreateArticleResponse) {
    option (google.api.http) = {
      post: "/v1/articles"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "Use this API to update create a new article";
      summary: "create an new article";
      tags: "Article";
    };
  }
  rpc DeleteArticle (DeleteArticleRequest) returns (DeleteArticleResponse) {
    option (google.api.http) = {
      delete: "/v1/articles/{id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "Use this API to delete article";
      summary: "delete an article";
      tags: "Article";
    };
  }
  rpc ListArticles (ListArticlesRequest) returns (ListArticlesResponse) {
    option (google.api.http) = {
      get: "/v1/articles"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "Use this API to get article list";
      summary: "list articles";
      tags: "Article";
    };
  }
  rpc GetArticle (GetArticleRequest) returns (GetArticleResponse) {
    option (google.api.http) = {
      get: "/v1/articles/{id}/{need_content}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "Use this API to get article info";
      summary: "get article info";
      tags: "Article";
    };
  }
  rpc UpdateArticle (UpdateArticleRequest) returns (UpdateArticleResponse) {
    option (google.api.http) = {
      patch: "/v1/articles"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "Use this API to update article info";
      summary: "update article info";
      tags: "Article";
    };
  }
  rpc UploadFile (UploadFileRequest) returns (UploadFileResponse) {
    option (google.api.http) = {
      post: "/v1/util/upload_file"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "Use this API upload file";
      summary: "upload file";
      tags: "Util";
    };
  }
  rpc CreateCategory (CreateCategoryRequest) returns (CreateCategoryResponse) {
    option (google.api.http) = {
      post: "/v1/categories"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "Use this API to create category";
      summary: "create category";
      tags: "Category";
    };
  }
  rpc DeleteCategory (DeleteCategoryRequest) returns (DeleteCategoryResponse) {
    option (google.api.http) = {
      delete: "/v1/categories/{id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "Use this API to delete category by id";
      summary: "delete category by id";
      tags: "Category";
    };
  }
  rpc UpdateCategory (UpdateCategoryRequest) returns (UpdateCategoryResponse) {
    option (google.api.http) = {
      patch: "/v1/categories"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "Use this API to update category";
      summary: "update category";
      tags: "Category";
    };
  }
  rpc ListCategories (ListCategoriesRequest) returns (ListCategoriesResponse) {
    option (google.api.http) = {
      get: "/v1/categories"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "Use this API to list category with pagination";
      summary: "list category";
      tags: "Category";
    };
  }
  rpc ListAllCategories (ListAllCategoriesRequest) returns (ListAllCategoriesResponse) {
    option (google.api.http) = {
      get: "/v1/categories/all"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      description: "Use this API to list all category";
      summary: "list all category";
      tags: "Category";
    };
  }
}
