syntax = "proto3";

package pb;

option go_package = "github.com/MonitorAllen/nostalgia/pb";

message PolishTextRequest {
  string mode = 1;
  string target = 2;
  string text = 3;
  string article_id = 4;
  string article_title = 5;
  string article_summary = 6;
  string article_excerpt = 7;
  string locale = 8;
}

message PolishSuggestion {
  string content = 1;
  string reason = 2;
}

message PolishTextResponse {
  repeated PolishSuggestion suggestions = 1;
  string mode = 2;
  string target = 3;
  string model = 4;
}

message GetAIConfigRequest {}

message GetAIConfigResponse {
  string provider = 1;
  string base_url = 2;
  string model = 3;
  bool api_key_configured = 4;
  bool enabled = 5;
  string timeout = 6;
  int32 max_input_chars = 7;
  int32 max_context_chars = 8;
  int32 max_suggestions = 9;
  string source = 10;
  string api_protocol = 11;
}

message UpdateAIConfigRequest {
  string provider = 1;
  string base_url = 2;
  string model = 3;
  string api_key = 4;
  string timeout = 5;
  int32 max_input_chars = 6;
  int32 max_context_chars = 7;
  int32 max_suggestions = 8;
  bool enabled = 9;
  bool clear_api_key = 10;
  string api_protocol = 11;
}

message ListAIModelsRequest {
  string provider = 1;
  string base_url = 2;
  string api_key = 3;
  string api_protocol = 4;
}

message ListAIModelsResponse {
  repeated string models = 1;
}
