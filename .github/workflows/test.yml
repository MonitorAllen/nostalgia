name: Run tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  backend:
    name: Test
    runs-on: ubuntu-latest

    env:
      ENVIRONMENT: test
      ALLOWED_ORIGINS: http://localhost
      DB_DRIVER: postgres
      DB_USER: root
      DB_PASSWORD: secret
      DB_SOURCE: postgresql://root:secret@localhost:5432/nostalgia?sslmode=disable
      DB_URL: postgresql://root:secret@localhost:5432/nostalgia?sslmode=disable
      MIGRATION_URL: file://db/migration
      RESOURCE_PATH: ./resources
      DOMAIN: http://localhost:8080
      HTTP_SERVER_ADDRESS: 0.0.0.0:8080
      GRPC_GATEWAY_ADDRESS: 0.0.0.0:9091
      GRPC_SERVER_ADDRESS: 0.0.0.0:9090
      TOKEN_SYMMETRIC_KEY: 12345678901234567890123456789012
      SETUP_TOKEN: ci-setup-token
      ACCESS_TOKEN_DURATION: 15m
      REFRESH_TOKEN_DURATION: 24h
      REDIS_ADDRESS: localhost:6379
      REDIS_CACHE_DB: "0"
      REDIS_QUEUE_DB: "1"
      AUTOMATION_HMAC_KEY_ID: codex-daily-writer
      AUTOMATION_HMAC_SECRET: ci-automation-secret
      AUTOMATION_SIGNATURE_TTL: 5m
      AUTOMATION_DAILY_DRAFT_LIMIT: "1"
      AUTOMATION_NOTIFY_EMAIL: noreply@example.com
      EMAIL_SENDER_NAME: Nostalgia CI
      EMAIL_SENDER_ADDRESS: noreply@example.com
      EMAIL_SENDER_PASSWORD: ci-mail-password
      UPLOAD_FILE_SIZE_LIMIT: "5242880"
      UPLOAD_FILE_ALLOWED_MIME: image/jpeg,image/png
      HTTP_PROXY_ADDR: ""

    services:
      postgres:
        image: groonga/pgroonga:3.2.3-alpine-16
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: nostalgia
        options: >-
          --health-cmd "pg_isready -U root -d nostalgia"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24.x

      - name: Install golang-migrate
        run: |
          curl -L https://github.com/golang-migrate/migrate/releases/download/v4.12.2/migrate.linux-amd64.tar.gz | tar xvz
          sudo mv migrate.linux-amd64 /usr/bin/migrate
          which migrate

      - name: Run migrations
        run: make migrateup

      - name: Run backend tests
        run: make test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: web/frontend
        run: bun install --frozen-lockfile

      - name: Run frontend tests
        working-directory: web/frontend
        run: bun test

      - name: Run type check
        working-directory: web/frontend
        run: bun run type-check

      - name: Build frontend
        working-directory: web/frontend
        run: bun run build

  compose-config:
    name: Compose Config
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Prepare compose environment
        run: cp .env.example .env

      - name: Validate production compose config
        run: docker compose config --quiet

      - name: Validate development compose config
        run: docker compose -f docker-compose.dev.yaml config --quiet
