services:
  postgres:
    image: groonga/pgroonga:3.2.3-alpine-16
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=nostalgia
      - PGDATA=/var/lib/postgresql/data/pgdata
    networks:
      - nostalgia
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    networks:
      - nostalgia
    restart: unless-stopped

  api:
    image: ${TCR_REGISTRY}/${TCR_NAMESPACE}/${API_REPOSITORY}:${API_TAG:-latest}
    env_file:
      - path: .env
    networks:
      - nostalgia
    volumes:
      - ./resources:/app/resources
    environment:
      - DB_SOURCE=postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/nostalgia?sslmode=disable
      - REDIS_ADDRESS=redis:6379
    depends_on:
      - postgres
      - redis
    entrypoint: ["/app/wait-for.sh", "postgres:5432", "--", "/app/start.sh"]
    command: ["/app/main"]
    restart: unless-stopped

  web:
    image: ${TCR_REGISTRY}/${TCR_NAMESPACE}/${WEB_REPOSITORY}:${WEB_TAG:-latest}
    volumes:
      - ./resources:/usr/share/nginx/resources
      - ./logs/nginx:/var/log/nginx
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - nostalgia
    depends_on:
      - api
    restart: unless-stopped

volumes:
  data-volume:

networks:
  nostalgia:
    driver: bridge
